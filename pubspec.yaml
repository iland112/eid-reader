name: eid_reader
description: Multi-platform eID Reader - e-Passport reading via NFC
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # NFC & Passport Reading (ICAO 9303)
  # Local fork with maxRead=224 (was 112) for faster DG2 reads
  dmrtd:
    path: dmrtd-fork
  flutter_nfc_kit: ^3.6.2

  # Camera + OCR + Face Detection
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_face_detection: ^0.12.0

  # Face embedding (on-device TFLite)
  tflite_flutter: ^0.11.0

  # Permissions
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17

  # HTTP client
  http: ^1.2.0

  # Screen wakelock (keep screen on during NFC reading)
  wakelock_plus: ^1.2.8

  # Image processing (JPEG2000 → PNG conversion)
  image: ^4.3.0
  ffi: ^2.1.3

  # PC/SC smart card reader (Desktop)
  dart_pcsc: ^2.0.2

  # File paths & sharing
  path_provider: ^2.1.0
  share_plus: ^10.0.0

  # Utilities
  equatable: ^2.0.7
  intl: ^0.19.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  mockito: ^5.4.4
  ffigen: ^16.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: 'assets/favicon.ico'
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: 'assets/favicon.ico'
